<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CDT-MFA | Next Gen Security</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

    <div class="hero-section animate-fade-in">
        <div class="glass-panel" style="padding: 4rem; text-align: center; max-width: 800px;">
            <i class="fa-solid fa-shield-halved" style="font-size: 4rem; color: var(--primary-color); margin-bottom: 1.5rem;"></i>
            <h1 class="hero-title">Zero Trust. <br> Continuous Auth.</h1>
            <p class="hero-subtitle">
                Advanced behavioral biometrics and digital twin modeling to secure your sessions in real-time.
            </p>
            
            <div class="hero-actions" style="justify-content: center;">
                <a href="/login" class="btn btn-primary">
                    <i class="fa-solid fa-arrow-right-to-bracket"></i> Enter System
                </a>
                <a href="https://github.com/google-deepmind" target="_blank" class="btn btn-secondary">
                    <i class="fa-brands fa-github"></i> Learn More
                </a>
            </div>

            <div class="metrics-grid" style="margin-top: 4rem; grid-template-columns: repeat(3, 1fr); gap: 1rem;">
                <div style="text-align: center;">
                    <i class="fa-solid fa-fingerprint" style="font-size: 2rem; color: var(--secondary-color); margin-bottom: 1rem;"></i>
                    <h4 style="font-size: 1rem;">Behavioral ID</h4>
                    <p style="font-size: 0.8rem; color: var(--text-muted);">Keystroke & Mouse Dynamics</p>
                </div>
                <div style="text-align: center;">
                    <i class="fa-solid fa-brain" style="font-size: 2rem; color: var(--primary-color); margin-bottom: 1rem;"></i>
                    <h4 style="font-size: 1rem;">AI Powered</h4>
                    <p style="font-size: 0.8rem; color: var(--text-muted);">Real-time Anomaly Detection</p>
                </div>
                <div style="text-align: center;">
                    <i class="fa-solid fa-lock" style="font-size: 2rem; color: var(--danger-color); margin-bottom: 1rem;"></i>
                    <h4 style="font-size: 1rem;">Auto-Lock</h4>
                    <p style="font-size: 0.8rem; color: var(--text-muted);">Instant Threat Mitigation</p>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
