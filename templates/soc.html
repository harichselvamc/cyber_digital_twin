<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SOC View | CDT-MFA</title>
  <!-- Fonts: Inter & JetBrains Mono -->
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <style>
    .soc-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 1rem;
    }

    .soc-table th,
    .soc-table td {
      text-align: left;
      padding: 1rem;
      border-bottom: 1px solid var(--border-color);
    }

    .soc-table th {
      color: var(--text-muted);
      font-weight: 500;
      text-transform: uppercase;
      font-size: 0.75rem;
      letter-spacing: 0.05em;
    }

    .soc-table tr:hover td {
      background: rgba(255, 255, 255, 0.02);
    }

    .status-dot {
      height: 8px;
      width: 8px;
      border-radius: 50%;
      display: inline-block;
      margin-right: 0.5rem;
    }
  </style>
</head>

<body>

  <div class="dashboard-grid">
    <!-- Sidebar (Shared) -->
    <aside class="sidebar">
      <div class="brand">
        <i class="fa-solid fa-layer-group"></i>
        <span>CDT-MFA <span style="font-weight:400; color:var(--text-muted); font-size:0.8em;">SOC</span></span>
      </div>

      <nav>
        <span class="label-sm" style="padding-left: 1rem; margin-bottom: 0.5rem; margin-top: 1rem;">Monitoring</span>
        <a href="/dashboard" class="nav-link">
          <i class="fa-solid fa-chart-line"></i> Dashboard
        </a>
        <a href="/soc" class="nav-link active">
          <i class="fa-solid fa-network-wired"></i> Live Analysts
        </a>

        <span class="label-sm" style="padding-left: 1rem; margin-bottom: 0.5rem; margin-top: 2rem;">Configuration</span>
        <a href="javascript:void(0)" onclick="alert('Enrollment module is under development.')" class="nav-link">
          <i class="fa-solid fa-fingerprint"></i> Enrollment
        </a>
        <a href="javascript:void(0)" onclick="alert('Settings module is under development.')" class="nav-link">
          <i class="fa-solid fa-sliders"></i> Settings
        </a>
      </nav>

      <div style="margin-top: auto;">
        <!-- Simplified User Panel for SOC View -->
        <div class="panel" style="padding: 1rem; margin-bottom: 1rem; background: #0f172a;">
          <div class="label-sm">Active Analyst</div>
          <div style="font-weight: 600; color: #fff;">{{ user }}</div>
        </div>
        <a href="/logout" class="btn btn-outline" style="width: 100%; border-color: var(--border-color);">
          <i class="fa-solid fa-right-from-bracket"></i> Logout
        </a>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">

      <!-- Header -->
      <header style="margin-bottom: 2rem; display: flex; justify-content: space-between; align-items: end;">
        <div>
          <h2 style="color: #fff;">SOC Surveillance</h2>
          <div style="color: var(--text-muted); font-size: 0.9rem;">Real-time session monitoring and intervention
            console.</div>
        </div>
        <div id="connectionStatus" class="badge"
          style="background: rgba(16, 185, 129, 0.1); color: var(--success-color);">
          <i class="fa-solid fa-circle" style="font-size: 6px; margin-right: 5px; vertical-align: middle;"></i> Live
          Feed
        </div>
      </header>

      <!-- SOC Table Panel -->
      <div class="panel" style="min-height: 500px;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
          <h3 style="font-size: 1.1rem; margin: 0;">Active Sessions</h3>

          <div style="display: flex; gap: 0.5rem;">
            <button class="btn btn-outline" style="padding: 0.4rem 0.8rem; font-size: 0.8rem;">
              <i class="fa-solid fa-filter"></i> Filter
            </button>
            <button class="btn btn-outline" style="padding: 0.4rem 0.8rem; font-size: 0.8rem;">
              <i class="fa-solid fa-download"></i> Export Log
            </button>
          </div>
        </div>

        <table class="soc-table">
          <thead>
            <tr>
              <th>User Identity</th>
              <th>Current Risk</th>
              <th>Threat Level</th>
              <th>Recommended Action</th>
              <th>Last Activity</th>
            </tr>
          </thead>
          <tbody id="socTableBody">
            <!-- Populated by JS -->
          </tbody>
        </table>
      </div>

    </main>
  </div>

  <script>
    // Polling for SOC data
    setInterval(async () => {
      try {
        const res = await fetch('/api/soc_live');
        if (!res.ok) throw new Error("Offline");
        const data = await res.json();

        const tbody = document.getElementById('socTableBody');
        tbody.innerHTML = '';

        Object.keys(data).forEach(user => {
          const info = data[user];
          const row = document.createElement('tr');

          let levelBadgeClass = 'badge-green';
          if (info.level === 'MEDIUM') levelBadgeClass = 'badge-yellow';
          if (info.level === 'HIGH') levelBadgeClass = 'badge-red';

          // Badge style manual override for table context if needed or use utility
          let badgeStyle = '';
          if (info.level === 'LOW') badgeStyle = 'background: rgba(16, 185, 129, 0.1); color: var(--success-color);';
          if (info.level === 'MEDIUM') badgeStyle = 'background: rgba(245, 158, 11, 0.1); color: var(--warning-color);';
          if (info.level === 'HIGH') badgeStyle = 'background: rgba(239, 68, 68, 0.1); color: var(--danger-color);';


          const date = new Date(info.time * 1000).toLocaleTimeString();

          // Risk Score Color
          let scoreColor = '#fff';
          if (info.risk_score > 70) scoreColor = 'var(--danger-color)';
          else if (info.risk_score > 30) scoreColor = 'var(--warning-color)';

          row.innerHTML = `
                    <td style="font-weight: 600; color: #fff;">
                        <div style="display: flex; align-items: center; gap: 0.75rem;">
                            <div style="width: 32px; height: 32px; background: var(--surface-color); border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 1px solid var(--border-color);">
                                <i class="fa-solid fa-user" style="color: var(--text-muted); font-size: 0.8rem;"></i>
                            </div>
                            <div>
                                <div>${user}</div>
                                <div style="font-size: 0.75rem; color: var(--primary-color);">Session Active</div>
                            </div>
                        </div>
                    </td>
                    <td style="font-family: var(--font-mono); font-weight: 700; color: ${scoreColor};">${Math.round(info.risk_score)}</td>
                    <td><span class="badge" style="${badgeStyle}">${info.level}</span></td>
                    <td style="font-weight: 500; color: ${info.action === 'BLOCK' ? 'var(--danger-color)' : (info.action === 'STEP_UP' ? 'var(--warning-color)' : 'var(--success-color)')}">
                        ${info.action}
                    </td>
                    <td style="font-family: var(--font-mono); font-size: 0.9rem; color: var(--text-muted);">${date}</td>
                `;
          tbody.appendChild(row);
        });

        const statusEl = document.getElementById('connectionStatus');
        statusEl.innerHTML = '<i class="fa-solid fa-circle" style="font-size: 6px; margin-right: 5px; vertical-align: middle;"></i> Live Feed';
        statusEl.style.color = 'var(--success-color)';
        statusEl.style.background = 'rgba(16, 185, 129, 0.1)';

      } catch (e) {
        const statusEl = document.getElementById('connectionStatus');
        statusEl.innerText = 'Offline';
        statusEl.style.color = 'var(--danger-color)';
        statusEl.style.background = 'rgba(239, 68, 68, 0.1)';
      }
    }, 1000);
  </script>
</body>

</html>
